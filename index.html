<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16243D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="le régime">
<title>le régime · skincare</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F3F6F8;
  --card:#FFFFFF;
  --ink:#16243D;
  --ink-soft:#5A6A82;
  --ink-faint:#93A0B2;
  --line:#E1E8EE;
  --line-soft:#EDF1F5;
  --blue:#6E9BC0;
  --blue-tint:#E9F1F7;
  --amber:#DD9445;
  --amber-tint:#FAF0E1;
  --amber-ink:#8A5316;
  --green:#2FA36B;
  --green-tint:#E4F3EC;
  --red:#C6604F;
  --red-tint:#F8EAE7;
  --shadow:0 1px 2px rgba(22,36,61,.04), 0 8px 24px rgba(22,36,61,.06);
  --shadow-sm:0 1px 2px rgba(22,36,61,.05);
  --r:16px;
  --r-sm:11px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:Inter,system-ui,sans-serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.mono{font-family:'Spline Sans Mono',monospace}
.serif{font-family:Fraunces,serif}

/* ---------- shell ---------- */
#app{max-width:520px;margin:0 auto;min-height:100%;position:relative;padding-bottom:calc(78px + var(--safe-b))}
header.top{
  position:sticky;top:0;z-index:20;
  background:rgba(243,246,248,.86);backdrop-filter:blur(12px);
  padding:calc(14px + var(--safe-t)) 20px 12px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid transparent;transition:border-color .2s;
}
header.top.scrolled{border-color:var(--line)}
.brand{display:flex;align-items:center;gap:9px}
.brand .cx{width:22px;height:22px}
.brand h1{font-family:Fraunces;font-weight:600;font-size:20px;letter-spacing:-.01em}
.phase-chip{
  font-family:'Spline Sans Mono',monospace;font-size:11px;font-weight:500;
  color:var(--ink-soft);background:var(--card);border:1px solid var(--line);
  padding:5px 10px;border-radius:100px;letter-spacing:.02em;
}
main{padding:4px 16px 24px}
.view{display:none;animation:fade .28s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- pharmacy cross ---------- */
.cx{display:inline-block;color:var(--green)}
.cx svg{display:block;width:100%;height:100%}

/* ---------- tonight card (hero) ---------- */
.script{
  background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  border:1px solid var(--line);overflow:hidden;margin:8px 0 20px;
}
.script-head{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:16px 18px 13px;border-bottom:1px dashed var(--line);
}
.script-head .eyebrow{
  font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px;
}
.script-head .today-date{font-family:Fraunces;font-size:15px;font-weight:500;color:var(--ink)}
.night-badge{
  display:inline-flex;align-items:center;gap:6px;font-family:'Spline Sans Mono',monospace;
  font-size:11px;font-weight:600;padding:6px 11px;border-radius:100px;letter-spacing:.02em;
  white-space:nowrap;
}
.night-badge.a313{background:var(--amber-tint);color:var(--amber-ink)}
.night-badge.recovery{background:var(--blue-tint);color:#2E5677}
.night-badge.rest{background:var(--green-tint);color:#1C6A45}
.night-badge .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.script-body{padding:14px 18px 16px}
.rx-line{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:7px 0;border-bottom:1px solid var(--line-soft);
}
.rx-line:last-child{border-bottom:none}
.rx-line .k{font-size:12.5px;color:var(--ink-soft)}
.rx-line .v{font-family:'Spline Sans Mono',monospace;font-size:12.5px;font-weight:500;color:var(--ink);text-align:right}
.rx-line .v.warm{color:var(--amber-ink)}

/* progress bar */
.phase-track{margin-top:12px}
.phase-track .bar{height:6px;background:var(--line-soft);border-radius:100px;overflow:hidden}
.phase-track .fill{height:100%;background:var(--amber);border-radius:100px;transition:width .6s cubic-bezier(.2,.7,.3,1)}
.phase-track .cap{display:flex;justify-content:space-between;margin-top:7px}
.phase-track .cap span{font-family:'Spline Sans Mono',monospace;font-size:10px;color:var(--ink-faint)}

/* ---------- routine cards ---------- */
.routine{
  background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);
  border:1px solid var(--line);margin-bottom:14px;overflow:hidden;
}
.routine.dim{opacity:.62}
.routine-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px 13px;cursor:pointer}
.routine-head .title{display:flex;align-items:center;gap:10px}
.routine-head .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none}
.ic.sun{background:var(--amber-tint)}
.ic.moon{background:var(--blue-tint)}
.ic svg{width:17px;height:17px}
.routine-head h3{font-family:Fraunces;font-size:16.5px;font-weight:600;letter-spacing:-.01em}
.routine-head .sub{font-family:'Spline Sans Mono',monospace;font-size:10.5px;color:var(--ink-faint);margin-top:1px}
.count{font-family:'Spline Sans Mono',monospace;font-size:12px;font-weight:600;color:var(--ink-soft);display:flex;align-items:center;gap:8px}
.count.done{color:var(--green)}
.chev{width:16px;height:16px;color:var(--ink-faint);transition:transform .25s}
.routine.collapsed .chev{transform:rotate(-90deg)}
.routine.collapsed .steps{display:none}
.steps{padding:2px 12px 10px}
.step{display:flex;gap:12px;padding:10px 8px;border-radius:11px;align-items:flex-start;transition:background .15s;user-select:none;cursor:pointer}
.step:active{background:var(--line-soft)}
.check{
  width:24px;height:24px;border-radius:8px;border:2px solid var(--line);flex:none;margin-top:1px;
  display:grid;place-items:center;transition:all .18s;background:var(--card);
}
.check svg{width:13px;height:13px;color:#fff;opacity:0;transform:scale(.5);transition:all .18s}
.step.on .check{background:var(--green);border-color:var(--green)}
.step.on .check svg{opacity:1;transform:scale(1)}
.step-body{flex:1;min-width:0}
.step-body .name{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-.01em}
.step.on .step-body .name{color:var(--ink-soft)}
.step-body .prod{font-size:12.5px;color:var(--ink-soft);margin-top:1px;line-height:1.4}
.step-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.tag{font-family:'Spline Sans Mono',monospace;font-size:10px;padding:2px 7px;border-radius:6px;background:var(--line-soft);color:var(--ink-soft);letter-spacing:.01em}
.tag.area{background:var(--blue-tint);color:#2E5677}
.tag.warm{background:var(--amber-tint);color:var(--amber-ink)}
.step-note{font-size:11.5px;color:var(--amber-ink);background:var(--amber-tint);padding:7px 10px;border-radius:8px;margin-top:8px;line-height:1.45}
.skip-btn{width:28px;height:28px;border-radius:8px;flex:none;display:grid;place-items:center;color:var(--line);align-self:flex-start;margin-top:1px}
.skip-btn svg{width:16px;height:16px}
.step:active .skip-btn{color:var(--ink-faint)}
.step.skipped .check{background:var(--ink-faint);border-color:var(--ink-faint)}
.step.skipped .check svg{opacity:1;transform:scale(1);color:#fff}
.step.skipped .step-body .name{color:var(--ink-faint);text-decoration:line-through;text-decoration-color:var(--line)}
.step.skipped .prod,.step.skipped .step-meta{opacity:.55}
.step.skipped .skip-btn{color:var(--ink-faint)}
.skip-note{font-size:11.5px;color:var(--ink-soft);background:var(--line-soft);padding:7px 10px;border-radius:8px;margin-top:8px;line-height:1.45}

/* history */
.hday summary{gap:9px;padding:13px 16px;font-size:13.5px}
.hdate{font-family:'Spline Sans Mono',monospace;font-size:12px;font-weight:600;color:var(--ink)}
.hbadge{font-family:'Spline Sans Mono',monospace;font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:5px;letter-spacing:.02em}
.hbadge.a313{background:var(--amber-tint);color:var(--amber-ink)}
.hbadge.off{background:var(--blue-tint);color:#2E5677}
.hbadge.rest{background:var(--green-tint);color:#1C6A45}
.hcounts{margin-left:auto;font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--ink-soft);font-weight:500}
.hskip{color:var(--ink-faint)}
.hsec{font-family:'Spline Sans Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin:4px 0 6px}
.hz{display:flex;align-items:baseline;gap:9px;padding:4px 0;font-size:12.5px}
.hzi{width:14px;flex:none;text-align:center;font-size:11px;font-weight:700}
.hzi.done{color:var(--green)} .hzi.skip{color:var(--ink-faint)} .hzi.none{color:var(--line)}
.hzn{color:var(--ink)}
.hzn.skipped{color:var(--ink-faint);text-decoration:line-through;text-decoration-color:var(--line)}
.hzn.none{color:var(--ink-faint)}
.hzr{margin-left:auto;font-family:'Spline Sans Mono',monospace;font-size:10px;color:var(--ink-faint);text-align:right}

/* calendar */
.cal{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 13px 12px;box-shadow:var(--shadow-sm);margin-bottom:11px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.cal-title{font-family:Fraunces;font-size:16px;font-weight:600;letter-spacing:-.01em}
.cnav{width:32px;height:32px;border-radius:9px;background:var(--line-soft);color:var(--ink-soft);font-size:17px;line-height:1;display:grid;place-items:center}
.cnav:active{background:var(--line)}
.cal-dow{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;margin-bottom:5px}
.cal-dow span{text-align:center;font-family:'Spline Sans Mono',monospace;font-size:9.5px;color:var(--ink-faint);letter-spacing:.04em}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px}
.cday{width:100%;aspect-ratio:1;min-width:0;border-radius:9px;position:relative;display:flex;align-items:center;justify-content:center;background:var(--paper);border:1px solid transparent;padding:0}
.cday.empty{background:transparent;pointer-events:none}
.cnum{font-family:'Spline Sans Mono',monospace;font-size:12px;color:var(--ink-soft);font-weight:500}
.cday.full{background:var(--green);}
.cday.full .cnum{color:#fff;font-weight:600}
.cday.part{background:var(--amber-tint);border-color:#EFD8B8}
.cday.part .cnum{color:var(--amber-ink)}
.cday.none .cnum{color:var(--ink-faint)}
.cday.future{background:transparent}
.cday.future .cnum{color:var(--line)}
.cday.today{outline:2px solid var(--blue);outline-offset:1px}
.cdot{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--amber)}
.cday.full .cdot{background:rgba(255,255,255,.9)}
.cskip{position:absolute;top:2px;right:3px;font-size:8px;color:var(--ink-faint);line-height:1}
.cday.full .cskip{color:rgba(255,255,255,.85)}
.cal-key{display:flex;flex-wrap:wrap;gap:11px;justify-content:center;margin-top:11px;padding-top:10px;border-top:1px solid var(--line-soft)}
.cal-key span{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--ink-faint);font-family:'Spline Sans Mono',monospace}
.cal-key .k{width:10px;height:10px;border-radius:3px;display:inline-block}
.cal-key .k.full{background:var(--green)}
.cal-key .k.part{background:var(--amber-tint);border:1px solid #EFD8B8}
.cal-key .k.dot{width:5px;height:5px;border-radius:50%;background:var(--amber)}
.cal-key .k.sk{background:none;font-size:9px;width:auto}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;margin-bottom:11px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 4px;text-align:center;box-shadow:var(--shadow-sm);min-width:0}
.stat b{display:block;font-family:Fraunces;font-size:19px;font-weight:600;line-height:1;color:var(--ink)}
.stat span{display:block;font-size:9.5px;color:var(--ink-faint);margin-top:4px;line-height:1.25}

/* segmented toggle */
.seg{display:flex;gap:4px;background:var(--line-soft);padding:3px;border-radius:11px;margin-bottom:11px}
.segb{flex:1;padding:8px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.segb.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm)}

/* agenda */
.ag-row{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--line);
  border-radius:var(--r-sm);padding:11px 13px;margin-bottom:7px;box-shadow:var(--shadow-sm)}
.ag-row.full{border-left-color:var(--green)}
.ag-head{display:flex;align-items:center;gap:8px}
.ag-date{font-family:'Spline Sans Mono',monospace;font-size:12px;font-weight:600;color:var(--ink)}
.ag-counts{margin-left:auto;font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--ink-soft)}
.ag-go{color:var(--ink-faint);font-size:15px;line-height:1}
.ag-skip{font-size:11.5px;color:var(--ink-soft);background:var(--line-soft);padding:5px 9px;border-radius:7px;margin-top:6px}
.ag-skip b{color:var(--ink);font-weight:600}

/* product skips */
.pskip-row{display:flex;align-items:center;gap:8px;width:100%;text-align:left;margin-top:11px;padding:9px 11px;
  background:var(--line-soft);border-radius:9px}
.pskip-ic{color:var(--ink-faint);font-size:12px;flex:none}
.pskip-tx{flex:1;font-size:11.5px;color:var(--ink-soft);line-height:1.35}
.pskip-tx b{color:var(--ink)}
.pskip-go{color:var(--ink-faint);font-size:15px;line-height:1;flex:none}
.pskip-card{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:var(--card);
  border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 13px;margin-bottom:7px;box-shadow:var(--shadow-sm)}
.pskip-l{flex:1;min-width:0}
.pskip-n{font-size:13.5px;font-weight:600;letter-spacing:-.01em;line-height:1.25}
.pskip-s{font-size:11px;color:var(--ink-faint);margin-top:2px}
.pskip-r{text-align:right;flex:none}
.pskip-r b{font-family:'Spline Sans Mono',monospace;font-size:14px;color:var(--ink)}
.pskip-run{display:block;font-family:'Spline Sans Mono',monospace;font-size:9.5px;color:var(--amber-ink);background:var(--amber-tint);padding:1px 6px;border-radius:5px;margin-top:3px}
.pskip-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;margin-top:2px}
.pskip-stats div{background:var(--line-soft);border-radius:9px;padding:10px 4px;text-align:center}
.pskip-stats b{display:block;font-family:Fraunces;font-size:18px;font-weight:600;color:var(--ink);line-height:1}
.pskip-stats span{display:block;font-size:9.5px;color:var(--ink-faint);margin-top:3px}

/* streak strip */
.streak{
  display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow-sm);margin-bottom:8px;
}
.streak .big{font-family:Fraunces;font-size:30px;font-weight:600;line-height:1;color:var(--ink)}
.streak .lbl{font-size:12.5px;color:var(--ink-soft);margin-top:3px}
.streak .cx-wrap{margin-left:auto;width:40px;height:40px;position:relative}
.week-dots{display:flex;gap:6px;margin-top:2px}
.week-dots .d{width:9px;height:9px;border-radius:50%;background:var(--line)}
.week-dots .d.f{background:var(--green)}
.week-dots .d.t{outline:2px solid var(--blue);outline-offset:1px}

/* ---------- generic section ---------- */
.section-label{
  font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-faint);margin:22px 4px 10px;
}
.section-label:first-child{margin-top:8px}

/* product cards */
.prod-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:15px 16px;margin-bottom:12px;box-shadow:var(--shadow-sm);
}
.prod-top{display:flex;gap:13px;align-items:flex-start}
.prod-thumb{
  width:46px;height:46px;border-radius:11px;flex:none;display:grid;place-items:center;
  font-family:Fraunces;font-weight:600;font-size:17px;color:#fff;
}
.prod-info{flex:1;min-width:0}
.prod-info .pname{font-size:14.5px;font-weight:600;letter-spacing:-.01em;line-height:1.25}
.prod-info .prole{font-family:'Spline Sans Mono',monospace;font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.stars{font-size:12px;color:var(--amber);letter-spacing:1px;margin-top:5px}
.prod-usage{margin-top:13px;padding-top:12px;border-top:1px solid var(--line-soft)}
.usage-row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.usage-row .status{font-size:12px;color:var(--ink-soft)}
.usage-row .status b{color:var(--ink)}
.gauge{height:6px;background:var(--line-soft);border-radius:100px;overflow:hidden;margin-top:9px}
.gauge .g{height:100%;border-radius:100px;transition:width .5s}
.btn-sm{
  font-size:11.5px;font-weight:600;font-family:'Spline Sans Mono',monospace;
  padding:6px 11px;border-radius:8px;background:var(--blue-tint);color:#2E5677;white-space:nowrap;
}
.btn-sm.opened{background:var(--line-soft);color:var(--ink-soft)}

/* progress / log */
.log-input{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm);margin-bottom:16px}
.log-input textarea{
  width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-family:inherit;
  font-size:14px;resize:vertical;min-height:64px;color:var(--ink);background:var(--paper);
}
.log-input textarea:focus{outline:none;border-color:var(--blue)}
.tag-picker{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0}
.tp{font-size:12px;font-family:'Spline Sans Mono',monospace;padding:6px 11px;border-radius:100px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);transition:all .15s}
.tp.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn{width:100%;padding:13px;border-radius:12px;background:var(--ink);color:#fff;font-weight:600;font-size:14px;transition:transform .1s,opacity .2s}
.btn:active{transform:scale(.985)}
.btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn.warn{background:var(--red-tint);color:var(--red)}
.log-entry{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 15px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.log-entry .ld{font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--ink-faint);display:flex;justify-content:space-between}
.log-entry .lt{font-size:13.5px;color:var(--ink);margin-top:6px;line-height:1.5;white-space:pre-wrap}
.log-entry .ltags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.del-x{color:var(--ink-faint);font-size:16px;line-height:1;padding:2px 4px}

/* timeline */
.tl{position:relative;padding-left:26px;margin-top:8px}
.tl::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl-item{position:relative;padding:0 0 18px}
.tl-item::before{content:'';position:absolute;left:-24px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--card);border:2px solid var(--blue)}
.tl-item.now::before{background:var(--amber);border-color:var(--amber)}
.tl-item.past::before{background:var(--green);border-color:var(--green)}
.tl-item .tw{font-family:'Spline Sans Mono',monospace;font-size:11px;font-weight:600;color:var(--ink);letter-spacing:.02em}
.tl-item .td{font-size:13px;color:var(--ink-soft);margin-top:3px;line-height:1.5}

/* troubleshooting */
.trouble{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm)}
.trouble summary{padding:15px 16px;font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:11px;list-style:none;cursor:pointer}
.trouble summary::-webkit-details-marker{display:none}
.trouble summary .sx{width:9px;height:9px;border-radius:50%;flex:none}
.trouble summary .plus{margin-left:auto;color:var(--ink-faint);font-size:18px;transition:transform .2s;font-weight:400}
.trouble[open] summary .plus{transform:rotate(45deg)}
.trouble .fix{padding:0 16px 16px 36px;font-size:13.5px;color:var(--ink-soft);line-height:1.6}
.trouble .fix ul{margin:6px 0 0;padding-left:16px}
.trouble .fix li{margin-bottom:6px}
.trouble .fix b{color:var(--ink)}

/* science accordion reuse .trouble */

/* info cards */
.info{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow-sm);margin-bottom:12px}
.info h4{font-family:Fraunces;font-size:16px;font-weight:600;margin-bottom:7px;letter-spacing:-.01em}
.info p{font-size:13.5px;color:var(--ink-soft);line-height:1.6}
.info p + p{margin-top:9px}

/* settings */
.set-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line-soft)}
.set-row:last-child{border-bottom:none}
.set-row .sl{font-size:14px;font-weight:500}
.set-row .sd{font-size:12px;color:var(--ink-faint);margin-top:2px}
input[type=date]{font-family:'Spline Sans Mono',monospace;font-size:13px;border:1px solid var(--line);border-radius:9px;padding:8px 10px;color:var(--ink);background:var(--card)}
.disclaimer{font-size:11.5px;color:var(--ink-faint);line-height:1.6;text-align:center;padding:18px 20px 4px}

/* ---------- tab bar ---------- */
nav.tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:rgba(255,255,255,.9);backdrop-filter:blur(16px);
  border-top:1px solid var(--line);
  display:flex;padding:8px 8px calc(8px + var(--safe-b));
  max-width:520px;margin:0 auto;
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--ink-faint);transition:color .18s}
.tab svg{width:22px;height:22px;stroke-width:1.9}
.tab span{font-size:10px;font-weight:600;letter-spacing:.01em}
.tab.active{color:var(--ink)}
.tab.active svg{stroke-width:2.3}

/* toast */
#toast{position:fixed;bottom:calc(92px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:11px 18px;border-radius:100px;
  box-shadow:0 8px 24px rgba(22,36,61,.25);opacity:0;pointer-events:none;transition:all .3s;z-index:50;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty{text-align:center;padding:40px 20px;color:var(--ink-faint)}
.empty .cx{width:34px;height:34px;margin:0 auto 12px;opacity:.5}
.empty p{font-size:13.5px}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
}
.cross-pulse{animation:pulse 1.6s ease-in-out}
@keyframes pulse{0%,100%{transform:scale(1)}30%{transform:scale(1.14)}}

/* adjustment banner */
.adj-banner{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;margin:8px 0 14px;border:1px solid}
.adj-banner.rest{background:var(--blue-tint);border-color:#CFE0EC}
.adj-banner.ease{background:var(--amber-tint);border-color:#EFD8B8}
.adj-ic{width:32px;height:32px;border-radius:9px;background:#fff;display:grid;place-items:center;flex:none}
.adj-ic svg{width:17px;height:17px}
.adj-tx{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.adj-tx b{font-size:13px;letter-spacing:-.01em}
.adj-tx span{font-family:'Spline Sans Mono',monospace;font-size:10px;color:var(--ink-soft)}
.adj-end{font-family:'Spline Sans Mono',monospace;font-size:11px;font-weight:600;color:var(--ink-soft);background:#fff;border:1px solid var(--line);padding:7px 11px;border-radius:8px;white-space:nowrap;flex:none}

/* action sheet / modal */
.modal-ov{position:fixed;inset:0;z-index:100;background:rgba(22,36,61,.34);display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .2s}
.modal-ov.show{opacity:1}
.modal{background:var(--card);width:100%;max-width:520px;border-radius:22px 22px 0 0;padding:22px 20px calc(20px + var(--safe-b));transform:translateY(24px);transition:transform .26s cubic-bezier(.2,.72,.28,1);box-shadow:0 -8px 44px rgba(22,36,61,.22)}
.modal-ov.show .modal{transform:none}
.modal .grip{width:38px;height:4px;border-radius:100px;background:var(--line);margin:-8px auto 15px}
.modal-h{font-family:Fraunces;font-size:19px;font-weight:600;letter-spacing:-.01em;margin-bottom:9px;display:flex;align-items:center;gap:10px}
.modal-h .mic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none}
.modal-b{font-size:13.5px;color:var(--ink-soft);line-height:1.6;margin-bottom:18px}
.modal-b b{color:var(--ink);font-weight:600}
.modal-actions{display:flex;flex-direction:column;gap:9px}
.mbtn{padding:13px;border-radius:12px;font-weight:600;font-size:14px;background:var(--line-soft);color:var(--ink);transition:transform .1s}
.mbtn:active{transform:scale(.985)}
.mbtn.primary{background:var(--ink);color:#fff}
.mbtn.ghost{background:transparent;color:var(--ink-faint)}

/* add-product form */
.form{display:flex;flex-direction:column;gap:2px;max-height:52vh;overflow-y:auto;margin:-4px -2px 2px;padding:0 2px}
.form .fl{font-size:11px;font-weight:600;color:var(--ink-soft);margin:10px 0 4px;display:block}
.form .fl .req{color:var(--red)}
.form .fi{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:14px;color:var(--ink);background:var(--paper)}
.form .fi:focus{outline:none;border-color:var(--blue)}
.form .frow{display:flex;gap:9px}
.form .frow>div{flex:1;min-width:0}
.rt-checks{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:2px}
.rt-check{display:flex;align-items:center;gap:8px;font-size:13px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;cursor:pointer;background:var(--card)}
.rt-check input{width:16px;height:16px;accent-color:var(--green)}
.who-tag{font-family:'Spline Sans Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--green);background:var(--green-tint);padding:3px 8px;border-radius:100px;position:relative;top:1px}
.prod-remove{width:30px;height:30px;border-radius:8px;flex:none;display:grid;place-items:center;color:var(--ink-faint);background:var(--line-soft)}
.prod-remove:active{background:var(--red-tint);color:var(--red)}
</style>

function b64utf8(str){ return btoa(unescape(encodeURIComponent(str))); }
async function ghPut(path, content, message, branch){
  const url=`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${path}`;
  const H={Authorization:`Bearer ${GH.token}`, Accept:'application/vnd.github+json'};
  let sha;
  try{ const head=await fetch(url+`?ref=${encodeURIComponent(branch)}`,{headers:H});
       if(head.status===200) sha=(await head.json()).sha; }catch(e){}
  const res=await fetch(url,{method:'PUT',headers:{...H,'Content-Type':'application/json'},
    body:JSON.stringify({message,branch,content:b64utf8(content),...(sha?{sha}:{})})});
  if(!res.ok){ const t=await res.text().catch(()=>''); throw new Error(res.status+(res.status===401?' · check token':res.status===404?' · check owner/repo':' '+t.slice(0,60))); }
}

/* ---------- date / phase helpers ---------- */
function weekOfPlan(dateStr=todayISO()){
  const start = new Date(S.start+'T00:00');
  const d = new Date(dateStr+'T00:00');
  const days = Math.floor((d - start)/86400000);
  return Math.max(1, Math.floor(days/7)+1);
}
function planStarted(dateStr=todayISO()){ return dateStr >= S.start; }
function nightType(dateStr=todayISO()){
  if(S.overrides[dateStr]) return S.overrides[dateStr];        // manual single-night override wins
  if(!planStarted(dateStr)) return 'recovery';                 // no retinoid before the plan begins
  const adj = activeAdjustment(dateStr);
  if(adj && adj.kind==='rest') return 'rest';                  // barrier rest = every night is a rest night
  const w = weekOfPlan(dateStr);
  const ph = phaseForWeek(w);
  const dow = new Date(dateStr+'T00:00').getDay();
  let nights = ph.nights;
  if(adj && adj.kind==='ease'){                                // ease = drop A313 one frequency step
    const i = PHASES.indexOf(ph);
    nights = i<=0 ? [] : PHASES[i-1].nights;                   // at the lowest phase, skip A313 entirely
  }
  return nights.includes(dow) ? 'a313' : 'recovery';
}
function eveningRoutineKey(dateStr=todayISO()){
  const t = nightType(dateStr);
  return t==='a313' ? 'a313' : (t==='rest' ? 'rest' : 'recovery');
}
function fmtDate(dateStr){
  return new Date(dateStr+'T00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
}
function fmtShort(dateStr){
  return new Date(dateStr+'T00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}
function addDays(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function untilSunday(){ const dow=new Date().getDay(); const add=(7-dow)%7; return addDays(add===0?7:add); }

/* ---------- log helpers ---------- */
function dayLog(dateStr=todayISO()){
  if(!S.logs[dateStr]) S.logs[dateStr] = {am:[], pm:[]};
  const l=S.logs[dateStr];
  if(!l.skip) l.skip={am:{},pm:{}};
  if(!l.skip.am) l.skip.am={};
  if(!l.skip.pm) l.skip.pm={};
  return l;
}
function isStepDone(part, idx, dateStr=todayISO()){ return dayLog(dateStr)[part].includes(idx); }
function skipEntry(part, idx, dateStr=todayISO()){
  const v=dayLog(dateStr).skip[part][idx];
  if(!v) return null;
  return typeof v==='string' ? {r:v, p:null, n:null} : v;   // legacy skips were bare strings
}
function isStepSkipped(part, idx, dateStr=todayISO()){ return !!dayLog(dateStr).skip[part][idx]; }
function skipReason(part, idx, dateStr=todayISO()){ const e=skipEntry(part,idx,dateStr); return e?e.r:''; }
function setSkip(part, idx, reason, dateStr=todayISO()){
  const l=dayLog(dateStr);
  if(reason){
    const list = part==='am'?amSteps():pmSteps(dateStr);
    const s=list[idx]||{};
    l.skip[part][idx]={r:reason, p:s.p||null, n:s.name||null};   // pin the product, not just the position
    const i=l[part].indexOf(idx); if(i>=0) l[part].splice(i,1);   // skipped ≠ done
  } else {
    delete l.skip[part][idx];
  }
  save();
}

/* ---- per-product skip history ---- */
function skipsByProduct(){
  const map={};
  Object.keys(S.logs).forEach(date=>{
    const l=S.logs[date]; if(!l.skip) return;
    ['am','pm'].forEach(part=>{
      Object.entries(l.skip[part]||{}).forEach(([idx,v])=>{
        const e = typeof v==='string' ? {r:v,p:null,n:null} : v;
        let pid=e.p, name=e.n;
        if(!pid){                                                 // resolve legacy entries positionally
          const list = part==='am'?amSteps():pmSteps(date);
          const s=list[+idx]; if(s){ pid=s.p; name=s.name; }
        }
        if(!pid) return;
        (map[pid]=map[pid]||[]).push({date, part, reason:e.r, name});
      });
    });
  });
  Object.values(map).forEach(a=>a.sort((x,y)=>y.date.localeCompare(x.date)));
  return map;
}
function currentRun(list){                                        // consecutive days ending at the newest skip
  if(!list.length) return 0;
  const days=[...new Set(list.map(x=>x.date))].sort().reverse();
  let run=1;
  for(let i=1;i<days.length;i++){
    const gap=(new Date(days[i-1])-new Date(days[i]))/86400000;
    if(gap===1) run++; else break;
  }
  return run;
}
function handledCount(part, dateStr=todayISO()){
  const l=dayLog(dateStr);
  return l[part].length + Object.keys(l.skip[part]).length;
}
function toggleStep(part, idx, dateStr=todayISO()){
  const l=dayLog(dateStr);
  delete l.skip[part][idx];                                       // completing clears a skip
  const arr=l[part];
  const i = arr.indexOf(idx);
  if(i>=0) arr.splice(i,1); else arr.push(idx);
  save();
}
function effectiveSteps(key){
  const base = ROUTINES[key].steps.filter(s=>!isHidden(s.p) && P[s.p]);
  const extra = customList()
    .filter(cp=>(cp.routines||[]).includes(key))
    .map(cp=>({p:cp.id, name:cp.stepLabel||cp.role||'Apply', amount:cp.amount||'', area:cp.area||'', custom:true}));
  return base.concat(extra);
}
function amSteps(){ return effectiveSteps('morning'); }
function pmSteps(dateStr=todayISO()){ return effectiveSteps(eveningRoutineKey(dateStr)); }
function amRoutine(){ return ROUTINES.morning; }
function pmRoutine(dateStr=todayISO()){ return ROUTINES[eveningRoutineKey(dateStr)]; }
function dayComplete(dateStr=todayISO()){
  return handledCount('am',dateStr)>=amSteps().length && handledCount('pm',dateStr)>=pmSteps(dateStr).length;
}
function streak(){
  let n=0; const d=new Date();
  for(let i=0;i<400;i++){
    const iso = d.toISOString().slice(0,10);
    if(i===0 && !dayComplete(iso)){ d.setDate(d.getDate()-1); continue; } // today not done yet doesn't break
    if(dayComplete(iso)) n++; else break;
    d.setDate(d.getDate()-1);
  }
  return n;
}

    <div>
      <div class="big">${st}</div>
      <div class="lbl">day streak${st===0?' · start tonight':''}</div>
      <div class="week-dots">${dots}</div>
    </div>
    <div class="cx-wrap"><span class="cx" style="width:100%;height:100%">${dayComplete()?CROSS_FILL:CROSS}</span></div>
  </div>`;

  v.innerHTML=html;
  const endBtn=v.querySelector('#adjEnd');
  if(endBtn) endBtn.addEventListener('click',endAdjustment);
  bindRoutineCards(v, iso);
}

function weekDots(){
  const out=[]; const d=new Date(); d.setDate(d.getDate()-6);
  for(let i=0;i<7;i++){
    const iso=d.toISOString().slice(0,10);
    const isToday = iso===todayISO();
    out.push(`<span class="d ${dayComplete(iso)?'f':''} ${isToday?'t':''}"></span>`);
    d.setDate(d.getDate()+1);
  }
  return out.join('');
}

function routineCard(key, part, iso, micro){
  const routine = ROUTINES[key];
  const stepList = effectiveSteps(key);
  const done = handledCount(part, iso);
  const total = stepList.length;
  const complete = done>=total;
  const icon = routine.icon==='sun'?SUN:MOON;
  let steps='';
  stepList.forEach((s,idx)=>{
    const prod=P[s.p]; if(!prod) return;
    const on=isStepDone(part,idx,iso);
    const sk=isStepSkipped(part,idx,iso);
    let meta='';
    if(s.amount) meta+=`<span class="tag">${s.amount}</span>`;
    if(s.area) meta+=`<span class="tag area">${s.area}</span>`;
    if(s.warm) meta+=`<span class="tag warm">${s.warm}</span>`;
    if(s.custom) meta+=`<span class="tag" style="background:var(--green-tint);color:#1C6A45">yours</span>`;
    steps+=`<div class="step ${on?'on':''} ${sk?'skipped':''}" data-part="${part}" data-idx="${idx}">
      <div class="check">${sk?SKIP_MARK:CHECK}</div>
      <div class="step-body">
        <div class="name">${s.name}</div>
        <div class="prod">${prod.name} · <span style="color:var(--ink-faint)">${prod.brand}</span></div>
        <div class="step-meta">${meta}</div>
        ${sk?`<div class="skip-note">Skipped · ${skipReason(part,idx,iso)}</div>`:(s.note?`<div class="step-note">${s.note}</div>`:'')}
      </div>
      <button class="skip-btn" data-skip="${part}:${idx}" title="Skip this step">${SKIP_IC}</button>
    </div>`;
  });
  return `<div class="routine" data-routine>
    <div class="routine-head" data-toggle>
      <div class="title">
        <div class="ic ${routine.icon}">${icon}</div>
        <div><h3>${routine.label}</h3><div class="sub">${routine.tag}${micro?' · '+micro:''}</div></div>
      </div>
      <div class="count ${complete?'done':''}">${done}/${total}<span class="chev">${CHEV}</span></div>
    </div>
    <div class="steps">${steps}</div>
  </div>`;
}

function bindRoutineCards(scope, iso){
  scope.querySelectorAll('.skip-btn').forEach(btn=>{
    btn.addEventListener('click',ev=>{
      ev.stopPropagation();
      const [part,idxs]=btn.dataset.skip.split(':'); const idx=+idxs;
      if(isStepSkipped(part,idx,iso)){ setSkip(part,idx,null,iso); renderToday(); renderTopbar(); toast('Skip removed'); return; }
      openSkipSheet(part,idx,iso);
    });
  });
  scope.querySelectorAll('.step').forEach(el=>{
    el.addEventListener('click',()=>{
      const part=el.dataset.part, idx=+el.dataset.idx;
      const wasComplete=dayComplete(iso);
      toggleStep(part,idx,iso);
      el.classList.toggle('on');
      // update count
      const card=el.closest('[data-routine]');
      const total = part==='am'?amSteps().length:pmSteps(iso).length;
      const done=handledCount(part,iso);
      const cnt=card.querySelector('.count');
      el.classList.remove('skipped');
      cnt.childNodes[0].textContent=done+'/'+total;
      cnt.classList.toggle('done',done>=total);
      renderTopbar();
      // celebrate first-time full completion
      if(!wasComplete && dayComplete(iso)){
        toast('Day complete — nice.');
        celebrate();
        renderToday(); // refresh streak
      }
    });
  });
  scope.querySelectorAll('[data-toggle]').forEach(h=>{
    h.addEventListener('click',()=>h.closest('[data-routine]').classList.toggle('collapsed'));
  });
}

const SKIP_REASONS=['Traveling','Too tired','Event / wearing makeup','Out of product','Skin felt sensitive','Deliberate rest','Other'];
function openSkipSheet(part, idx, iso){
  const stepList = part==='am'?amSteps():pmSteps(iso);
  const s=stepList[idx]; const label=s?s.name:'this step';
  showModal({
    title:'Skip “'+label+'”?', icon:SKIP_IC, iconBg:'var(--line-soft)',
    body:`Recorded as an <b>intentional skip</b>, with your reason, so your history stays accurate. It won't break your streak and won't trigger any change to your A313 schedule.`,
    actions:SKIP_REASONS.map(r=>({label:r, cls:r==='Other'?'ghost':'', onClick:()=>{
      if(r==='Other'){ promptSkipReason(part,idx,iso); return; }
      setSkip(part,idx,r,iso); renderToday(); renderTopbar(); toast('Skip logged');
    }}))
  });
}
function promptSkipReason(part, idx, iso){
  showModal({
    title:'Why skipped?', icon:SKIP_IC, iconBg:'var(--line-soft)',
    body:`<div class="form"><input class="fi" id="skip_r" placeholder="e.g. sunburn, dermatologist said to pause" maxlength="60"></div>`,
    actions:[{label:'Save skip', cls:'primary', keep:true},{label:'Cancel', cls:'ghost'}],
    onMount:(ov)=>{
      const inp=ov.querySelector('#skip_r'); setTimeout(()=>inp.focus(),120);
      ov.querySelector('.mbtn.primary').addEventListener('click',()=>{
        const r=inp.value.trim()||'Other';
        setSkip(part,idx,r,iso); closeModal(); renderToday(); renderTopbar(); toast('Skip logged');
      });
    }
  });
}

function showModal(cfg){

  const icon = cfg.icon ? `<span class="mic" style="background:${cfg.iconBg||'var(--blue-tint)'}">${cfg.icon}</span>` : '';

/* ---- decide whether a logged symptom warrants an offer ---- */
function maybeSuggestAdjustment(tags){
  const has=t=>tags.includes(t);
  if(has('red')||has('stinging')) { suggestRest(tags); return true; }   // strongest: pause everything
  if(has('peeling')||has('dry'))  { suggestEase(tags); return true; }   // buffer + step down
  if(has('breakout')||has('purging')) { suggestPurge(); return true; }  // reassure, hold steady
  return false;
}
function suggestRest(tags){
  const u3=addDays(2), uw=untilSunday();
  const flagged = tags.filter(t=>['red','stinging','dry','peeling'].includes(t)).join(', ');
  showModal({
    title:'Give your barrier a rest?', icon:REST_IC, iconBg:'var(--blue-tint)',
    body:`You logged <b>${flagged||'irritation'}</b>. The troubleshooting rule for redness or stinging is to pause all actives — cleanse and moisturize only — until skin calms, then ease A313 back in.<br><br>Switch your upcoming evenings to <b>barrier rest</b>?`,
    actions:[
      {label:`Rest 3 nights · to ${fmtShort(u3)}`, cls:'primary', onClick:()=>applyAdjustment('rest',u3,flagged||'irritation')},
      {label:`Rest of week · to ${fmtShort(uw)}`, onClick:()=>applyAdjustment('rest',uw,flagged||'irritation')},
      {label:'Not now', cls:'ghost'}
    ]
  });
}
function suggestEase(tags){
  const u7=addDays(6), uw=untilSunday();
  const flagged = tags.filter(t=>['peeling','dry'].includes(t)).join(' & ');
  showModal({
    title:'Ease off A313 for a bit?', icon:EASE_IC, iconBg:'var(--amber-tint)',
    body:`You logged <b>${flagged||'dryness'}</b>. The guide says to buffer A313 with moisturizer and drop it down one frequency step — don't push through peeling.<br><br>Reduce A313 by a step until skin settles?`,
    actions:[
      {label:`Ease · rest of week · to ${fmtShort(uw)}`, cls:'primary', onClick:()=>applyAdjustment('ease',uw,flagged||'dryness')},
      {label:`Ease · 7 days · to ${fmtShort(u7)}`, onClick:()=>applyAdjustment('ease',u7,flagged||'dryness')},
      {label:'Not now', cls:'ghost'}
    ]
  });
}
function suggestPurge(){
  const w=weekOfPlan();
  const inWindow = w>=2 && w<=6;
  showModal({
    title:'That’s most likely purging', icon:PURGE_IC, iconBg:'var(--green-tint)',
    body:`${inWindow?`You're in week ${w} — right in the purge window.`:''} Breakouts in your usual chin and jaw zones are typically A313 surfacing what was already coming, not the retinoid harming you. The move is to <b>hold steady and not add products</b>.<br><br>If it's new areas, cystic, or past week 8, treat it as irritation instead — check troubleshooting.`,
    actions:[
      {label:'Got it — hold steady', cls:'primary'},
      {label:'Open troubleshooting', onClick:()=>switchTab('more')}
    ]
  });
}

/* ---- PRODUCTS ---- */
function renderProducts(){
  const v=document.getElementById('v-products');
  const SKIPMAP=skipsByProduct();
  let html=`<button class="btn ghost" id="addProdBtn" style="margin:6px 0 14px;display:flex;align-items:center;justify-content:center;gap:8px">
    <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Add a product</button>`;
  html+='<div class="section-label">shelf · tap “opened” to track usage</div>';
  catalogue().forEach(p=>{
    const opened=S.opened[p.id];
    const inRoutines=(p.routines||[]).length ? `<span class="prole" style="color:#1C6A45"> · in ${(p.routines||[]).length} routine${p.routines.length>1?'s':''}</span>`:'';
    let usage='';
    if(opened){
      const start=new Date(opened+'T00:00');
      const used=Math.floor((Date.now()-start)/86400000);
      const life=p.lifeDays||90;
      const remain=life-used;
      const pct=Math.max(0,Math.min(100,Math.round(used/life*100)));
      let col=remain<0?'var(--red)':(remain<=14?'var(--amber)':'var(--green)');
      let status = remain<0 ? `<b style="color:var(--red)">Likely empty</b> · replace now`
                : remain<=14 ? `<b>~${remain} days</b> left · reorder soon`
                : `<b>~${remain} days</b> of usage left`;
      usage=`<div class="prod-usage">
        <div class="usage-row"><div class="status">${status}</div>
          <button class="btn-sm opened" data-reset="${p.id}">opened ${opened.slice(5)}</button></div>
        <div class="gauge"><div class="g" style="width:${pct}%;background:${col}"></div></div>
      </div>`;
    } else {
      usage=`<div class="prod-usage"><div class="usage-row">
        <div class="status" style="color:var(--ink-faint)">Not opened yet — tap when you start it</div>
        <button class="btn-sm" data-open="${p.id}">Mark opened</button></div></div>`;
    }
    const skipList=(SKIPMAP[p.id])||[];
    const skipDays=[...new Set(skipList.map(x=>x.date))];
    const run=currentRun(skipList);
    const skipRow = skipDays.length ? `<button class="pskip-row" data-pskip="${p.id}">
        <span class="pskip-ic">⊘</span>
        <span class="pskip-tx">Skipped <b>${skipDays.length}×</b>${run>1?` · <b style="color:var(--amber-ink)">${run} days running</b>`:''} · last ${fmtShort(skipDays[0])}</span>
        <span class="pskip-go">›</span>
      </button>` : '';
    html+=`<div class="prod-card">
      <div class="prod-top">
        <div class="prod-thumb" style="background:${p.color||'#6E9BC0'}">${(p.brand||p.name||'·')[0]}</div>
        <div class="prod-info">
          <div class="pname">${p.name}${p.custom?' <span class="tag" style="background:var(--green-tint);color:#1C6A45;font-size:9px">yours</span>':''}</div>
          <div class="prole">${p.brand||''}${p.brand?' · ':''}${p.role||''} · ${p.size||''}${inRoutines}</div>
          <div class="stars">${'★'.repeat(p.stars||0)}${'☆'.repeat(5-(p.stars||0))}</div>
        </div>
        <button class="prod-remove" data-remove="${p.id}" title="Remove">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13h10l1-13"/></svg>
        </button>
      </div>
      ${p.note?`<p style="font-size:12.5px;color:var(--ink-soft);margin-top:11px;line-height:1.5">${p.note}</p>`:''}
      ${skipRow}
      ${usage}
    </div>`;
  });
  // hidden / removed built-ins → restore
  const hid=(S.hidden||[]).map(id=>PRODUCTS.find(p=>p.id===id)).filter(Boolean);
  if(hid.length){
    html+='<div class="section-label">removed · tap to restore</div>';
    hid.forEach(p=>{
      html+=`<div class="prod-card" style="opacity:.7;display:flex;align-items:center;justify-content:space-between;padding:12px 16px">
        <div><div class="pname" style="font-size:13.5px">${p.name}</div><div class="prole">${p.brand} · ${p.role}</div></div>
        <button class="btn-sm" data-restore="${p.id}">Restore</button></div>`;
    });
  }
  v.innerHTML=html;

  v.querySelector('#addProdBtn').addEventListener('click',openAddProduct);
  v.querySelectorAll('[data-open]').forEach(b=>b.addEventListener('click',()=>{
    S.opened[b.dataset.open]=todayISO(); save(); renderProducts(); toast('Marked opened today');
  }));
  v.querySelectorAll('[data-reset]').forEach(b=>b.addEventListener('click',()=>{
    if(confirm('Reset the opened date for this product?')){ delete S.opened[b.dataset.reset]; save(); renderProducts(); }
  }));
  v.querySelectorAll('[data-pskip]').forEach(b=>b.addEventListener('click',()=>openProductSkips(b.dataset.pskip)));
  v.querySelectorAll('[data-remove]').forEach(b=>b.addEventListener('click',()=>removeProduct(b.dataset.remove)));
  v.querySelectorAll('[data-restore]').forEach(b=>b.addEventListener('click',()=>{
    S.hidden=(S.hidden||[]).filter(id=>id!==b.dataset.restore); save(); rebuildP(); renderProducts(); renderTopbar(); toast('Restored');
  }));
}

function removeProduct(id){
  const p=P[id]; if(!p) return;
  const custom=customList().some(c=>c.id===id);
  const used=(p.routines||[]).length || ROUTINES.morning.steps.concat(ROUTINES.a313.steps,ROUTINES.recovery.steps,ROUTINES.rest.steps).some(s=>s.p===id);
  const msg = custom ? `Delete “${p.name}”? This removes it from your shelf and any routines.` 
                     : `Remove “${p.name}”? It'll leave your routines and shelf, but you can restore it anytime.`;
  showModal({
    title: custom?'Delete product?':'Remove product?',
    body: msg + (used?'<br><br><b>Note:</b> it currently appears in a routine — that step will disappear.':''),
    actions:[
      {label: custom?'Delete':'Remove', cls:'primary', onClick:()=>{
        if(custom){ S.customProducts=customList().filter(c=>c.id!==id); delete S.opened[id]; }
        else { S.hidden=[...(S.hidden||[]), id]; }
        save(); rebuildP(); renderProducts(); renderTopbar(); toast(custom?'Deleted':'Removed');
      }},
      {label:'Keep it', cls:'ghost'}
    ]
  });
}

let calRef = new Date(); calRef.setDate(1);
function dayHas(iso){
  const l=S.logs[iso]; if(!l) return false;
  return (l.am&&l.am.length)||(l.pm&&l.pm.length)||(l.skip&&(Object.keys(l.skip.am||{}).length||Object.keys(l.skip.pm||{}).length));
}
function daySkips(iso){
  const l=S.logs[iso]; if(!l||!l.skip) return 0;
  return Object.keys(l.skip.am||{}).length+Object.keys(l.skip.pm||{}).length;
}
function dayState(iso){
  if(iso>todayISO()) return 'future';
  if(!dayHas(iso)) return 'none';
  return dayComplete(iso) ? 'full' : 'part';
}
function monthStats(y,m){
  let done=0, tracked=0, a313=0, skips=0, elapsed=0;
  const last=new Date(y,m+1,0).getDate();
  for(let d=1; d<=last; d++){
    const iso=new Date(Date.UTC(y,m,d)).toISOString().slice(0,10);
    if(iso>todayISO()) continue;
    if(iso<S.start) continue;
    elapsed++;
    if(dayHas(iso)) tracked++;
    if(dayComplete(iso)) done++;
    if(nightType(iso)==='a313' && dayComplete(iso)) a313++;
    skips+=daySkips(iso);
  }
  return {done,tracked,a313,skips,elapsed, pct: elapsed?Math.round(done/elapsed*100):0};
}
function bestStreak(){
  const dates=Object.keys(S.logs).filter(dayComplete).sort();
  let best=0,run=0,prev=null;
  dates.forEach(d=>{
    if(prev){ const gap=(new Date(d)-new Date(prev))/86400000; run = gap===1 ? run+1 : 1; }
    else run=1;
    prev=d; if(run>best) best=run;
  });
  return best;
}
let progView='cal';
function agendaHTML(){
  const dates=Object.keys(S.logs).filter(dayHas).sort().reverse().slice(0,45);
  if(!dates.length) return `<div class="empty"><p>Nothing logged yet. Days appear here as you tick them off.</p></div>`;
  return dates.map(iso=>{
    const nt=nightType(iso);
    const badge = nt==='a313'?'<span class="hbadge a313">A313</span>'
                : nt==='rest'?'<span class="hbadge rest">rest</span>'

    const am=amSteps().length, pm=pmSteps(iso).length;
    const full=dayComplete(iso);
    const l=dayLog(iso);
    const skips=[];
    ['am','pm'].forEach(part=>Object.keys(l.skip[part]||{}).forEach(idx=>{
      const e=skipEntry(part,+idx,iso);
      const nm=e.n || ((part==='am'?amSteps():pmSteps(iso))[+idx]||{}).name || 'step';
      skips.push(`<div class="ag-skip">⊘ <b>${nm}</b> — ${e.r}</div>`);
    }));
    return `<button class="ag-row ${full?'full':''}" data-day="${iso}">
      <div class="ag-head">
        <span class="ag-date">${fmtShort(iso)}</span>
        ${badge}
        <span class="ag-counts">${handledCount('am',iso)}/${am} · ${handledCount('pm',iso)}/${pm}</span>
        <span class="ag-go">›</span>
      </div>
      ${skips.join('')}
    </button>`;
  }).join('');
}
function calendarHTML(){

    const started = iso>=S.start;

    const sk=daySkips(iso);
    cells+=`<button class="cday ${state} ${isToday?'today':''}" data-day="${iso}">

    <div class="cal-dow">${['S','M','T','W','T','F','S'].map(d=>`<span>${d}</span>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-key">
      <span><i class="k full"></i>complete</span>
      <span><i class="k part"></i>partial</span>
      <span><i class="k dot"></i>A313</span>
      <span><i class="k sk">⊘</i>skip</span>
    </div>
  </div>`}
  <div class="stats">
    <div class="stat"><b>${pctLabel}</b><span>days complete</span></div>
    <div class="stat"><b>${st.a313}</b><span>A313 nights</span></div>
    <div class="stat"><b>${streak()}</b><span>current streak</span></div>
    <div class="stat"><b>${bestStreak()}</b><span>best streak</span></div>

}
function openProductSkips(pid){
  const list=(skipsByProduct()[pid])||[];
  const prod=P[pid];
  if(!list.length){ toast('No skips recorded'); return; }
  const run=currentRun(list);
  const first=list[list.length-1];
  const counts={}; list.forEach(x=>counts[x.reason]=(counts[x.reason]||0)+1);
  const chips=Object.entries(counts).sort((a,b)=>b[1]-a[1])
    .map(([r,n])=>`<span class="tag">${r} · ${n}</span>`).join('');

function stepStateLine(part, idx, name, iso){
  if(isStepDone(part,idx,iso))
    return `<div class="hz"><span class="hzi done">✓</span><span class="hzn">${name}</span></div>`;
  if(isStepSkipped(part,idx,iso))
    return `<div class="hz"><span class="hzi skip">⊘</span><span class="hzn skipped">${name}</span><span class="hzr">${skipReason(part,idx,iso)}</span></div>`;
  return `<div class="hz"><span class="hzi none">·</span><span class="hzn none">${name}</span><span class="hzr">not logged</span></div>`;
}

  currentTab=name;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('v-'+name).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  RENDER[name]();
  window.scrollTo({top:0,behavior:'instant'});
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));
window.addEventListener('scroll',()=>{
  document.getElementById('topbar').classList.toggle('scrolled', window.scrollY>4);
},{passive:true});

/* init */
renderTopbar();
renderToday();

/* auto-backup to GitHub, at most once a day, when the app is opened */
if(GH.auto && GH.token && GH.owner && GH.repo && GH.last!==todayISO()){
  setTimeout(()=>doBackup(true), 1500);
}

/* service worker */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
